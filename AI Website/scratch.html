<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratch Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #eef5fc 0%, #dcecff 100%);
      color: #002e5d;
    }

    .card {
      width: min(90vw, 560px);
      padding: 2rem;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 40px rgba(0, 46, 93, 0.12);
      text-align: center;
    }

    a {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.85rem 1.25rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      background: #0f5fbf;
      color: white;
    }
  </style>
</head>
<body>
  <!-- This simple scratch page gives the teacher a direct link into the main app. -->
  <main class="card">
    <h1>Scratch Page</h1>
    <p>This page links to the single-file laundry inventory app for the project.</p>
    <a href="./index.html">Open BYU Laundry</a>
  </main>
</body>
</html>
